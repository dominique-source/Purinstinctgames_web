<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Compare — PürInstinct Championship</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@1,900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0A0A;--white:#F4F4F2;--muted:#888888;--lime:#CCFF00;
  --display:'Barlow Condensed',sans-serif;--body:'Barlow',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--white);font-family:var(--body);font-size:17px;-webkit-font-smoothing:antialiased;padding:40px clamp(16px,4vw,40px) 80px}
h1,.disp{font-family:var(--display);font-weight:900;font-style:italic;text-transform:uppercase;letter-spacing:-.015em}
.head{max-width:1100px;margin:0 auto 8px}
.head h1{font-size:clamp(28px,5vw,52px);line-height:.95}
.head p{color:var(--muted);margin-top:10px;max-width:60ch;line-height:1.6}
.opts{max-width:1100px;margin:36px auto 0;display:flex;flex-direction:column;gap:40px}
.opt{border:1px solid rgba(255,255,255,.08);padding:clamp(20px,3vw,34px);position:relative}
.opt-tag{display:flex;align-items:center;gap:14px;margin-bottom:24px;flex-wrap:wrap}
.swatch{width:42px;height:42px;border-radius:3px;flex-shrink:0}
.opt-name{font-family:var(--display);font-weight:900;font-style:italic;text-transform:uppercase;font-size:clamp(20px,2.6vw,30px)}
.opt-hex{font-family:var(--body);font-weight:700;font-size:14px;color:var(--muted);letter-spacing:.04em}
.opt-note{font-size:14px;color:var(--muted);margin-left:auto;max-width:42ch;line-height:1.5}
@media(max-width:680px){.opt-note{margin-left:0;flex-basis:100%}}

/* podium row (mirrors championship.html) */
.grid{display:grid;grid-template-columns:1fr 1.3fr 1fr;gap:clamp(12px,2vw,20px);align-items:end}
@media(max-width:640px){.grid{grid-template-columns:1fr}}
.pod{background:#111;border:1px solid rgba(255,255,255,.08);padding:clamp(20px,3vw,30px) clamp(16px,2.5vw,26px);text-align:center}
.pod--2,.pod--3{margin-bottom:clamp(16px,3vw,30px)}
@media(max-width:640px){.pod--2,.pod--3{margin-bottom:0}}
.pod--1{border-color:var(--g);box-shadow:0 0 40px var(--g-glow),inset 0 0 60px rgba(0,0,0,0)}
.pod--1{background:linear-gradient(160deg,rgba(0,0,0,.2),#111)}
.rank{font-family:var(--display);font-weight:900;font-style:italic;text-transform:uppercase;font-size:11px;letter-spacing:.2em;color:var(--muted);margin-bottom:14px}
.pod--1 .rank{color:var(--g)}
.ico{display:flex;justify-content:center;margin-bottom:14px;color:var(--muted)}
.ico svg{width:clamp(34px,4.6vw,46px);height:auto}
.pod--1 .ico{color:var(--g);filter:drop-shadow(0 0 14px var(--g-glow))}
.pod--2 .ico{color:#C8CBD0}
.pod--3 .ico{color:#C08552}
.amt{font-family:var(--display);font-weight:900;font-style:italic;font-size:clamp(34px,5vw,58px);line-height:1;margin-bottom:6px;font-variant-numeric:tabular-nums}
.pod--1 .amt{color:var(--g)}
.lbl{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}

/* mini accents row */
.accents{display:flex;flex-wrap:wrap;gap:14px;margin-top:26px;align-items:center}
.eyebrow{font-family:var(--display);font-weight:900;font-style:italic;text-transform:uppercase;color:var(--g);letter-spacing:.06em;font-size:16px;display:inline-flex;align-items:center;gap:10px}
.eyebrow::before{content:"";width:34px;height:3px;background:var(--g);transform:skewX(-30deg)}
.btn{display:inline-block;font-family:var(--display);font-weight:900;font-style:italic;text-transform:uppercase;font-size:16px;background:var(--g);color:#0A0A0A;padding:11px 24px 12px;letter-spacing:.02em;clip-path:polygon(10px 0,100% 0,calc(100% - 10px) 100%,0 100%)}
.slash{background:var(--g);padding:10px 18px;transform:skewX(-8deg)}
.slash span{display:inline-block;transform:skewX(8deg);font-family:var(--display);font-weight:900;font-style:italic;text-transform:uppercase;font-size:15px;color:#0A0A0A}
.foot{max-width:1100px;margin:50px auto 0;color:var(--muted);font-size:14px;line-height:1.6;border-top:1px solid rgba(255,255,255,.08);padding-top:20px}
.foot b{color:var(--white)}
</style>
</head>
<body>

<div class="head">
  <h1>Comparaison des tons d'or</h1>
  <p>Les trois tons sur le vrai fond noir, avec le podium des prix et les accents (eyebrow, bouton, slash bar). L'or actuel du site est le <b style="color:#D4AF37">#D4AF37</b>.</p>
</div>

<div class="opts" id="opts"></div>

<div class="foot">
  Dis-moi simplement <b>A</b>, <b>B</b> ou <b>C</b> (ou un autre hex) et je l'applique partout sur la page Championship, puis je publie.
</div>

<script>
var TROPHY = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>';
var MEDAL = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.21 15 2.66 7.14a2 2 0 0 1 .13-2.2L4.4 2.8A2 2 0 0 1 6 2h12a2 2 0 0 1 1.6.8l1.6 2.14a2 2 0 0 1 .14 2.2L16.79 15"/><path d="M11 12 5.12 2.2"/><path d="m13 12 5.88-9.8"/><path d="M8 7h8"/><circle cx="12" cy="17" r="5"/><path d="M12 18v-2h-.5"/></svg>';

function rgba(hex,a){var n=parseInt(hex.slice(1),16);return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')';}

var OPTS = [
  {id:'A', name:'A — Champagne', hex:'#E8C36B', note:'Plus clair, doux, élégant. Luxe discret mais un peu moins percutant.'},
  {id:'B', name:'B — Or vif (recommandé)', hex:'#F0B429', note:'Chaud, lumineux, comme du vrai métal de trophée. Fort contraste sur le noir. Mon choix.'},
  {id:'C', name:'C — Ambre profond', hex:'#C99A2E', note:'Plus riche et foncé. Proche de l\'original, tire légèrement vers le moutarde.'},
];

document.getElementById('opts').innerHTML = OPTS.map(function(o){
  return '<div class="opt" style="--g:'+o.hex+';--g-glow:'+rgba(o.hex,.22)+'">'
    + '<div class="opt-tag"><span class="swatch" style="background:'+o.hex+'"></span>'
    + '<span class="opt-name" style="color:'+o.hex+'">'+o.name+'</span>'
    + '<span class="opt-hex">'+o.hex+'</span>'
    + '<span class="opt-note">'+o.note+'</span></div>'
    + '<div class="grid">'
    + '<div class="pod pod--2"><div class="rank">2e place</div><span class="ico">'+MEDAL+'</span><div class="amt">$2 500</div><div class="lbl">en prix</div></div>'
    + '<div class="pod pod--1"><div class="rank">1re place — Champion</div><span class="ico">'+TROPHY+'</span><div class="amt">$25 000</div><div class="lbl">en prix</div></div>'
    + '<div class="pod pod--3"><div class="rank">3e place</div><span class="ico">'+MEDAL+'</span><div class="amt">$1 500</div><div class="lbl">en prix</div></div>'
    + '</div>'
    + '<div class="accents"><span class="eyebrow">Prix en jeu</span>'
    + '<a class="btn">Inscrire mon équipe →</a>'
    + '<span class="slash"><span>Ville contre ville. Qui gagne ?</span></span></div>'
    + '</div>';
}).join('');
</script>
</body>
</html>
